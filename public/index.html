<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyper.io</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #111; font-family: sans-serif; overflow: hidden; color: #fff; }
        #nameScreen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #0f171e; }
        #nameInput { padding: 12px; font-size: 18px; border-radius: 20px; border: 2px solid #00bcd4; background: #000; color: #fff; text-align: center; margin-bottom: 20px; }
        #playButton { padding: 12px 30px; font-size: 18px; background: #00bcd4; border: none; color: #fff; border-radius: 20px; cursor: pointer; font-weight: bold; }
        
        #gameContainer { display: none; width: 100%; height: 100%; position: relative; }
        #gameCanvas { background: #eee; display: block; }
        
        /* LEFT ALIGNED LEADERBOARD HUD */
        #uiLayer { position: absolute; top: 20px; left: 20px; width: 250px; background: rgba(0,0,0,0.75); padding: 15px; border-radius: 10px; pointer-events: none; }
        #leaderboard h3 { margin: 0 0 10px 0; color: #00bcd4; font-size: 16px; text-transform: uppercase; }
        .player-info { display: flex; align-items: center; justify-content: space-between; font-size: 14px; margin-bottom: 8px; }
        .player-color-badge { width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; display: inline-block; border: 1px solid #fff; }
        .player-info.you { font-weight: bold; color: #fff; border-left: 3px solid #00bcd4; padding-left: 5px; }
        
        /* CENTER TOP LARGE TIMER */
        #timerHUD { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); font-size: 38px; font-weight: bold; color: #fff; background: rgba(0,0,0,0.8); padding: 8px 25px; border-radius: 30px; border: 2px solid #00bcd4; letter-spacing: 1px; pointer-events: none; text-shadow: 0 0 10px rgba(0,188,212,0.4); }

        #gameOverScreen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        #gameOverScreen h2 { font-size: 45px; color: #ff3b30; margin-bottom: 10px; }
        .menu-btn { padding: 12px 35px; font-size: 16px; font-weight: bold; border-radius: 25px; cursor: pointer; margin: 10px; width: 200px; border: none; }
        .respawn-btn { background: #4caf50; color: #fff; }
        .mainmenu-btn { background: #555; color: #fff; }
    </style>
    <script src="https://gamedistribution.com/html5-sdk/js"></script>
</head>
<body>

    <div id="nameScreen">
        <h1>Hyper.io</h1>
        <input type="text" id="nameInput" placeholder="Enter Nickname" maxlength="14">
        <button id="playButton">Enter Arena</button>
    </div>

    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <!-- LEFT SIDE LEADERBOARD -->
        <div id="uiLayer">
            <div id="leaderboard">
                <h3>Arena Standings</h3>
                <div id="playersList"></div>
            </div>
        </div>
        
        <!-- TOP MIDDLE TIMER -->
        <div id="timerHUD">2:00</div>
        
        <div id="gameOverScreen">
            <h2>Game Over</h2>
            <p id="finalScore">Your Score: 0 pts</p>
            <button class="menu-btn respawn-btn" id="respawnBtn">Respawn</button>
            <button class="menu-btn mainmenu-btn" id="mainMenuBtn">Main Menu</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
