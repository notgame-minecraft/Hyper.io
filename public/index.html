<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyper.io</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #1a1a1a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; color: #fff; }
        #nameScreen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: radial-gradient(circle, #2c3e50, #0f171e); }
        #nameScreen h1 { font-size: 48px; margin-bottom: 20px; letter-spacing: 2px; text-transform: uppercase; color: #00bcd4; text-shadow: 0 0 10px rgba(0,188,212,0.5); }
        #nameInput { padding: 12px 20px; font-size: 18px; border: 2px solid #00bcd4; background: rgba(0,0,0,0.5); color: #fff; border-radius: 25px; outline: none; width: 250px; text-align: center; margin-bottom: 20px; transition: 0.3s; }
        #nameInput:focus { box-shadow: 0 0 15px #00bcd4; }
        #playButton { padding: 12px 40px; font-size: 18px; background: #00bcd4; border: none; color: #fff; border-radius: 25px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        #playButton:hover { background: #00acc1; transform: scale(1.05); box-shadow: 0 0 15px rgba(0,188,212,0.4); }
        
        #gameContainer { display: none; width: 100%; height: 100%; position: relative; }
        #gameCanvas { background: #f0f0f0; display: block; box-shadow: 0 0 20px rgba(0,0,0,0.8); margin: auto; }
        
        #uiLayer { position: absolute; top: 20px; right: 20px; width: 240px; background: rgba(20,20,20,0.85); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(5px); pointer-events: none; }
        #leaderboard h3 { margin: 0 0 10px 0; color: #00bcd4; font-size: 16px; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }
        .player-info { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; opacity: 0.8; }
        .player-info.you { color: #00bcd4; font-weight: bold; opacity: 1; }
        
        /* MODERN GAME OVER OVERLAY */
        #gameOverScreen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 15, 20, 0.9); flex-direction: column; align-items: center; justify-content: center; z-index: 10; backdrop-filter: blur(8px); }
        #gameOverScreen h2 { font-size: 42px; color: #ff3b30; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        #gameOverScreen p { font-size: 18px; color: #a0aab0; margin-bottom: 30px; }
        .menu-btn { padding: 12px 35px; font-size: 16px; font-weight: bold; text-transform: uppercase; border: none; border-radius: 25px; cursor: pointer; margin: 10px; width: 200px; transition: 0.2s; }
        .respawn-btn { background: #4caf50; color: #fff; }
        .respawn-btn:hover { background: #45a049; transform: scale(1.03); }
        .mainmenu-btn { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
        .mainmenu-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.03); }
    </style>
    <!-- Discord SDK Client Asset API Hooks -->
    <script src="https://gamedistribution.com/html5-sdk/js"></script>
</head>
<body>

    <div id="nameScreen">
        <h1>Hyper.io</h1>
        <input type="text" id="nameInput" placeholder="Enter Nickname" maxlength="14">
        <button id="playButton">Enter Arena</button>
    </div>

    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="uiLayer">
            <div id="leaderboard">
                <h3>Leaderboard</h3>
                <div id="playersList"></div>
            </div>
        </div>
        
        <!-- UI Screen Dialog Layer -->
        <div id="gameOverScreen">
            <h2>Wasted</h2>
            <p id="finalScore">Your Score: 0 pts</p>
            <button class="menu-btn respawn-btn" id="respawnBtn">Respawn</button>
            <button class="menu-btn mainmenu-btn" id="mainMenuBtn">Main Menu</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
